<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OKO VISION - Historial</title>
    <style>
        :root {
            --bg-primary: #0A0F1E;
            --bg-secondary: #141E33;
            --accent-cyan: #00D2FF;
            --accent-blue: #0077EE;
            --text-primary: #D1D9E6;
            --text-secondary: #8A99AF;
            --success: #00FF87;
            --warning: #FFA500;
            --danger: #FF5252;
            --glass: rgba(20, 30, 51, 0.75);
            --border: rgba(0, 210, 255, 0.15);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Inter', 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, var(--bg-primary) 0%, var(--bg-secondary) 100%);
            min-height: 100vh;
            color: var(--text-primary);
            line-height: 1.6;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 6rem 2rem 2rem;
            position: relative;
        }
        
        .back-btn {
            position: absolute;
            top: 2rem;
            left: 2rem;
            background: rgba(0, 210, 255, 0.1);
            border: 1px solid rgba(0, 210, 255, 0.3);
            color: var(--accent-cyan);
            padding: 0.6rem 1.2rem;
            border-radius: 12px;
            text-decoration: none;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-weight: 600;
            font-size: 0.9rem;
            z-index: 10;
        }
        
        .back-btn:hover {
            background: var(--accent-cyan);
            color: var(--bg-primary);
            transform: translateX(-5px);
        }
        
        .header {
            background: var(--glass);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 2rem;
            margin-bottom: 2.5rem;
            text-align: center;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.4);
        }
        
        .header h1 {
            color: var(--accent-cyan);
            font-size: 2rem;
            font-weight: 800;
        }

        .filter-section {
            background: var(--glass);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 1.5rem 2rem;
            margin-bottom: 2rem;
            display: flex;
            flex-wrap: wrap;
            gap: 1.5rem;
            align-items: center;
        }

        .filter-group {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .filter-group label {
            font-size: 0.85rem;
            font-weight: 700;
            color: var(--accent-cyan);
            text-transform: uppercase;
        }

        .filter-group select, .filter-group input {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border);
            color: var(--text-primary);
            padding: 0.6rem 1rem;
            border-radius: 12px;
            font-size: 0.9rem;
            outline: none;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .stat-card {
            background: var(--glass);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 1.5rem;
            display: flex;
            align-items: center;
            gap: 1.5rem;
        }

        .stat-icon {
            width: 60px;
            height: 60px;
            background: rgba(0, 210, 255, 0.1);
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--accent-cyan);
            font-size: 1.5rem;
        }

        .stat-card h3 {
            font-size: 1.8rem;
            font-weight: 800;
        }

        .stat-card p {
            font-size: 0.8rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            font-weight: 700;
        }

        .history-card {
            background: var(--glass);
            border: 1px solid var(--border);
            border-radius: 28px;
            padding: 2rem;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
        }

        .table-container { width: 100%; overflow-x: auto; }

        table { width: 100%; border-collapse: collapse; }

        th {
            text-align: left;
            padding: 1.2rem;
            color: var(--accent-cyan);
            font-weight: 700;
            text-transform: uppercase;
            font-size: 0.8rem;
            border-bottom: 2px solid var(--border);
        }

        td {
            padding: 1.2rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .badge {
            padding: 0.4rem 1rem;
            border-radius: 100px;
            font-size: 0.75rem;
            font-weight: 800;
            text-transform: uppercase;
        }

        .badge-success { background: rgba(0, 255, 135, 0.1); color: var(--success); }
        .badge-warning { background: rgba(255, 165, 0, 0.1); color: var(--warning); }

        @media (max-width: 768px) {
            .filter-section { flex-direction: column; align-items: stretch; }
            th { display: none; }
            td { display: block; text-align: right; }
            td::before { content: attr(data-label); float: left; color: var(--accent-cyan); font-weight: 700; }
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="{{ url_for('user.dashboard') }}" class="back-btn">
            <i class="fas fa-arrow-left"></i> Volver al Dashboard
        </a>
        
        <header class="header">
            <h1>Registro de Accesos</h1>
        </header>

        <div class="filter-section">
            <div class="filter-group">
                <label>Tipo</label>
                <select id="typeFilter">
                    <option value="all">Todos</option>
                    <option value="entrada">Entradas</option>
                    <option value="salida">Salidas</option>
                </select>
            </div>
            <div class="filter-group">
                <label>Desde</label>
                <input type="date" id="dateFrom">
            </div>
            <div class="filter-group">
                <label>Hasta</label>
                <input type="date" id="dateTo">
            </div>
        </div>

        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-icon"><i class="fas fa-sign-in-alt"></i></div>
                <div><h3>24</h3><p>Entradas</p></div>
            </div>
            <div class="stat-card">
                <div class="stat-icon"><i class="fas fa-sign-out-alt"></i></div>
                <div><h3>22</h3><p>Salidas</p></div>
            </div>
            <div class="stat-card">
                <div class="stat-icon"><i class="fas fa-check-double"></i></div>
                <div><h3>100%</h3><p>Efectividad</p></div>
            </div>
        </div>
        
        <div class="history-card">
            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>Fecha</th>
                            <th>Tipo</th>
                            <th>Placa</th>
                            <th>Estado</th>
                        </tr>
                    </thead>
                    <tbody>
                        {% if accesos %}
                            {% for acceso in accesos %}
                                <tr>
                                    <td data-label="Fecha">{{ acceso.fecha }}</td>
                                    <td data-label="Tipo">{{ acceso.tipo }}</td>
                                    <td data-label="Placa"><strong>{{ acceso.placa }}</strong></td>
                                    <td data-label="Estado">
                                        <span class="badge {{ 'badge-success' if acceso.estatus == 'Autorizado' else 'badge-warning' }}">
                                            {{ acceso.estatus }}
                                        </span>
                                    </td>
                                </tr>
                            {% endfor %}
                        {% else %}
                            <tr><td colspan="4" style="text-align: center; padding: 3rem;">Sin registros.</td></tr>
                        {% endif %}
                    </tbody>
                </table>
            </div>
        </div>
    </div>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</body>
</html>
