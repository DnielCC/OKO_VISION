<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OKO VISION - Mi Perfil</title>
    <style>
        :root {
            --bg-primary: #0A0F1E;
            --bg-secondary: #141E33;
            --accent-cyan: #00D2FF;
            --accent-blue: #0077EE;
            --text-primary: #D1D9E6;
            --text-secondary: #8A99AF;
            --success: #00FF87;
            --glass: rgba(20, 30, 51, 0.75);
            --border: rgba(0, 210, 255, 0.15);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Inter', 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, var(--bg-primary) 0%, var(--bg-secondary) 100%);
            min-height: 100vh;
            color: var(--text-primary);
            line-height: 1.6;
        }
        
        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 4rem 2rem 2rem;
            position: relative;
        }
        
        .back-btn {
            position: absolute;
            top: 2rem;
            left: 2rem;
            background: rgba(0, 210, 255, 0.1);
            border: 1px solid rgba(0, 210, 255, 0.3);
            color: var(--accent-cyan);
            padding: 0.6rem 1.2rem;
            border-radius: 12px;
            text-decoration: none;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-weight: 600;
            font-size: 0.9rem;
            z-index: 10;
        }
        
        .back-btn:hover {
            background: var(--accent-cyan);
            color: var(--bg-primary);
            box-shadow: 0 0 20px rgba(0, 210, 255, 0.3);
            transform: translateX(-5px);
        }
        
        .header {
            background: var(--glass);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 2.5rem;
            margin-bottom: 2.5rem;
            text-align: center;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.4);
        }
        
        .header h1 {
            color: var(--accent-cyan);
            font-size: 2.2rem;
            font-weight: 800;
            text-shadow: 0 0 15px rgba(0, 210, 255, 0.3);
        }
        
        .profile-grid {
            display: grid;
            grid-template-columns: 1fr 1.5fr;
            gap: 2.5rem;
        }
        
        .card {
            background: var(--glass);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border);
            border-radius: 28px;
            padding: 2.5rem;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        
        .avatar {
            width: 140px;
            height: 140px;
            background: linear-gradient(135deg, var(--accent-cyan), var(--accent-blue));
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 1.5rem;
            font-size: 4rem;
            color: var(--bg-primary);
            box-shadow: 0 0 30px rgba(0, 210, 255, 0.3);
            border: 4px solid rgba(255, 255, 255, 0.1);
        }
        
        .profile-name {
            font-size: 1.8rem;
            font-weight: 800;
            color: var(--text-primary);
            margin-bottom: 0.5rem;
        }

        .profile-badge {
            background: rgba(0, 255, 135, 0.1);
            color: var(--success);
            padding: 0.4rem 1.2rem;
            border-radius: 100px;
            font-size: 0.85rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            border: 1px solid rgba(0, 255, 135, 0.2);
        }
        
        .details-list {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 1.2rem;
        }
        
        .detail-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1.2rem 1.5rem;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.06);
            transition: all 0.3s;
        }

        .detail-item:hover {
            background: rgba(255, 255, 255, 0.06);
            transform: scale(1.02);
        }
        
        .detail-item label {
            color: var(--accent-cyan);
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.85rem;
            letter-spacing: 1px;
        }

        .detail-item span {
            font-weight: 700;
            font-size: 1.1rem;
        }

        @media (max-width: 850px) {
            .profile-grid { grid-template-columns: 1fr; }
            .container { padding-top: 5rem; }
        }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <a href="{{ url_for('user.dashboard') }}" class="back-btn">
            <i class="fas fa-arrow-left"></i> Volver al Dashboard
        </a>
        
        <header class="header">
            <h1>Mi Perfil de Usuario</h1>
        </header>
        
        <div class="profile-grid">
            <div class="card">
                <div class="avatar">
                    <i class="fas fa-user"></i>
                </div>
                <h2 class="profile-name">{{ user.nombre }}</h2>
                <div class="profile-badge">Estudiante Activo</div>
            </div>
            
            <div class="card" style="align-items: stretch;">
                <div class="details-list">
                    <div class="detail-item">
                        <label>Nombre Completo</label>
                        <span>{{ user.nombre }}</span>
                    </div>
                    <div class="detail-item">
                        <label>Matrícula</label>
                        <span>{{ user.matricula }}</span>
                    </div>
                    <div class="detail-item">
                        <label>Tipo de Usuario</label>
                        <span>Alumno</span>
                    </div>
                    <div class="detail-item">
                        <label>Fecha de Registro</label>
                        <span>2024-01-15</span>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
