services:
  # Aplicación Flask (Usuario)
  flask_user:
    build:
      context: ./Flask_User
      dockerfile: Dockerfile
    container_name: oko_vision_flask
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - FLASK_ENV=development
      - FLASK_DEBUG=1
    volumes:
      - ./Flask_User:/app
    networks:
      - oko_network

  # Aplicación Laravel (Administrador)
  laravel_admin:
    build: ./Laravel_Admin
    container_name: oko_vision_laravel
    ports:
      - "8001:8000"
    environment:
      - DB_CONNECTION=sqlite
      - DB_DATABASE=/var/www/html/database/database.sqlite
      - SESSION_DRIVER=file
      - CACHE_STORE=file
      - APP_DEBUG=true
    volumes:
      - ./Laravel_Admin:/var/www/html
    working_dir: /var/www/html
    networks:
      - oko_network


networks:
  oko_network:
    driver: bridge
