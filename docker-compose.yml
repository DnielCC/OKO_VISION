services:
  # Base de Datos PostgreSQL
  postgres_db:
    image: postgres:16-alpine
    container_name: oko_vision_db
    restart: unless-stopped
    environment:
      - POSTGRES_USER=oko_admin
      - POSTGRES_PASSWORD=oko_password
      - POSTGRES_DB=oko_vision
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db_init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U oko_admin -d oko_vision"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - oko_network

  # API Backend (FastAPI)
  api_backend:
    build:
      context: ./API_Backend
      dockerfile: Dockerfile
    container_name: oko_vision_api
    restart: unless-stopped
    ports:
      - "8002:8000"
    environment:
      - DATABASE_URL=postgresql://oko_admin:oko_password@postgres_db:5432/oko_vision
    volumes:
      - ./API_Backend:/app
    depends_on:
      postgres_db:
        condition: service_healthy
    networks:
      - oko_network

  # Aplicación Flask (Usuario)
  flask_user:
    build:
      context: ./Flask_User
      dockerfile: Dockerfile
    container_name: oko_vision_flask
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - FLASK_ENV=development
      - FLASK_DEBUG=1
      - API_URL=http://api_backend:8000
    volumes:
      - ./Flask_User:/app
    networks:
      - oko_network

  # Aplicación Laravel (Administrador)
  laravel_admin:
    build: ./Laravel_Admin
    container_name: oko_vision_laravel
    ports:
      - "8001:8000"
    environment:
      - DB_CONNECTION=pgsql
      - DB_HOST=postgres_db
      - DB_PORT=5432
      - DB_DATABASE=oko_vision
      - DB_USERNAME=oko_admin
      - DB_PASSWORD=oko_password
      - API_URL=http://api_backend:8000
      - PHP_CLI_SERVER_WORKERS=8
      - APP_DEBUG=true
      - SESSION_DRIVER=cookie
      - APP_KEY=base64:FaBcBKAnX5hFuBM1O4B67bVHVTQRZr/iLem9jkeFG5U=
    volumes:
      - ./Laravel_Admin/app:/var/www/html/app
      - ./Laravel_Admin/config:/var/www/html/config
      - ./Laravel_Admin/resources:/var/www/html/resources
      - ./Laravel_Admin/routes:/var/www/html/routes
      - ./Laravel_Admin/public:/var/www/html/public
      - ./Laravel_Admin/database:/var/www/html/database
    depends_on:
      postgres_db:
        condition: service_healthy
      api_backend:
        condition: service_started
    networks:
      - oko_network


networks:
  oko_network:
    driver: bridge

volumes:
  postgres_data:
